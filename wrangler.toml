# Cloudflare Wrangler 配置文件示例
# 请将此文件重命名为 wrangler.toml 并填入真实的配置信息

name = "user-auth-app"
compatibility_date = "2024-01-01"

# Pages 项目配置
pages_build_output_dir = ".next"

# 环境变量配置（可选，也可以在 Cloudflare Dashboard 中配置）
[vars]
# 注意事项：
# 1. database_id 需要在 Cloudflare Dashboard 的 D1 页面获取
# 2. JWT_SECRET 建议使用生产环境的 Secrets 管理，不要硬编码在配置文件中
# 3. binding 名称必须与代码中使用的名称一致（这里是 "DB"）
